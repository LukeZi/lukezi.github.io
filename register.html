<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Register - TestForge</title>

  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/components.css">
</head>

<body>

<section class="container" style="padding-top: 140px; max-width: 500px;">
  <a href="tech.html" class="btn-secondary" style="margin-bottom: 20px; display: inline-block;">
  &larr; Zur Hauptseite
  </a>

  <div class="card">

    <h1 class="section-title">Create Account</h1>

    <form id="registerForm">

      <div class="form-group">
        <label>Username</label>
        <input type="text" id="username" required>
      </div>

      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" required minlength="6">
      </div>

      <button class="btn-primary" type="submit">
        Register
      </button>

    </form>

    <br>

    <p>
      Already registered?
      <a href="login.html">Login here</a>
    </p>

  </div>

</section>

<script src="js/auth.js"></script>

</body>
</html>
