<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FastFood Express</title>
    <link rel="stylesheet" href="style_food.css">
</head>
<body>

<header>
    <h1>FastFood Express</h1>

    <div class="header-right">

        <a href="index.html" class="home-button">
            Startseite
        </a>

        <button id="darkmode-toggle">
            Darkmode
        </button>

        <div class="cart-icon">
            Warenkorb: <span id="cart-count">0</span>
        </div>
    </div>
</header>

<main>

    <section class="products" id="products"></section>

    <section class="sidebar">

        <section class="cart">
            <h2>Warenkorb</h2>

            <div id="cart-items"></div>

            <div class="cart-total">
                Gesamt: <span id="total-price">0.00 Euro</span>
            </div>
        </section>

        <section class="delivery-form">
            <h2>Lieferadresse</h2>

            <form id="address-form">

                <input
                    type="text"
                    id="fullname"
                    placeholder="Vor- und Nachname"
                    required
                >

                <input
                    type="text"
                    id="street"
                    placeholder="Straße und Hausnummer"
                    required
                >

                <input
                    type="text"
                    id="city"
                    placeholder="Ort"
                    required
                >

                <input
                    type="text"
                    id="zipcode"
                    placeholder="Postleitzahl"
                    required
                >

                <button type="submit" id="order-btn">
                    Jetzt bestellen
                </button>

            </form>

            <div id="form-message"></div>

        </section>

    </section>

</main>

<script src="script_food.js"></script>
</body>
</html>
