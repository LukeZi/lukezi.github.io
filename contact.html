<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Contact - TestForge</title>

  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/responsive.css">
</head>

<body>

<header class="header">
  <div class="container nav-container">
    <div class="logo">TestForge</div>

    <nav class="nav" id="nav">
      <a href="index.html">Home</a>
      <a href="about.html">About</a>
      <a href="faq.html">FAQ</a>
      <a href="configurator.html">Configurator</a>
      <a href="contact.html" class="active">Contact</a>
      <a href="login.html">Login</a>
    </nav>

    <button class="burger" id="burger"> Menu </button>
  </div>
</header>

<section class="container" style="padding-top: 160px;">

  <h1 class="section-title">Contact Us</h1>

  <div class="card">

    <form id="contactForm">

      <div class="form-group">
        <label>Name</label>
        <input type="text" id="name" required>
      </div>

      <div class="form-group">
        <label>Email</label>
        <input type="email" id="email" required>
      </div>

      <div class="form-group">
        <label>Message</label>
        <textarea id="message" rows="6" required></textarea>
      </div>

      <button type="submit" class="btn-primary">
        Send Message
      </button>

    </form>

    <div id="formMessage"></div>

  </div>

</section>

<footer class="footer">
  <div class="container footer-grid">
    <div>
      <h3>TestForge</h3>
      <p>Need support? Contact our infrastructure specialists.</p>
    </div>
  </div>
</footer>

<script src="js/navigation.js"></script>
<script src="js/contact.js"></script>

</body>
</html>
